# Gitleaks configuration for HFL
# Ignores false positives in documentation examples

title = "HFL gitleaks config"

[allowlist]
  description = "Allow common false positives"

  # Allow README example API keys (placeholders)
  paths = [
    '''README\.md''',
    '''README\.es\.md''',
    '''docs/.*\.md''',
  ]

  # Allow common placeholder patterns in documentation
  regexTarget = "match"
  regexes = [
    # Placeholder API keys in examples
    '''your-secret-key''',
    '''your-api-key''',
    '''api[_-]?key[_-]?here''',
    # Bearer token placeholders
    '''Bearer\s+your[_-]token''',
    '''Bearer\s+<token>''',
  ]
