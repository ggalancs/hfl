# Publish the HFL wheel + sdist to PyPI on release tags.
#
# Uses PyPI's Trusted Publisher flow (OIDC): no API token in the
# repo, no long-lived credential to rotate. The PyPI project must
# have GitHub Actions configured as a trusted publisher for this
# repository + workflow filename (``publish-pypi.yml``).
#
# Also uploads a Sigstore attestation alongside the artefacts for
# supply-chain verifiability.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Upload to TestPyPI instead of PyPI"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.testpypi == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/hfl/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hfl/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Sigstore attestation
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: ./dist/*.whl ./dist/*.tar.gz
