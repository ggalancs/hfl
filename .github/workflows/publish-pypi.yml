# Publish the HFL wheel + sdist to PyPI on release tags.
#
# Uses PyPI's Trusted Publisher flow (OIDC): no API token in the
# repo, no long-lived credential to rotate. The PyPI project must
# have GitHub Actions configured as a trusted publisher for this
# repository + workflow filename (``publish-pypi.yml``).
#
# Also uploads a Sigstore attestation alongside the artefacts for
# supply-chain verifiability.

name: Publish to PyPI

on:
  # Tag trigger intentionally removed: no automatic publish to PyPI. Run
  # manually from the Actions tab.
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Upload to TestPyPI instead of PyPI"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: python -m pip install --upgrade "pip>=26.1" build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel metadata
        run: |
          python -m pip install --upgrade "pip>=26.1" twine
          twine check dist/*

      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.testpypi == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/hfl/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    # Publish to real PyPI on a MANUAL dispatch against a release tag
    # (``gh workflow run publish-pypi.yml --ref vX.Y.Z``). The old
    # ``event_name == 'push'`` guard could never fire once the tag trigger was
    # removed, so the job was permanently skipped. Still gated on a ``refs/tags/v``
    # ref so you can't publish from a branch, and excluded when ``testpypi`` is
    # requested (that path goes to TestPyPI above).
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.testpypi != 'true' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hfl/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Sigstore attestation
        uses: sigstore/gh-action-sigstore-python@v3.4.0
        with:
          inputs: ./dist/*.whl ./dist/*.tar.gz
