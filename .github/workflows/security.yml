name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering
  schedule:
    # Run weekly on Monday at midnight
    - cron: '0 0 * * 1'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          # Upgrade pip first: setup-python ships pip 26.0.1, which is
          # affected by CVE-2026-3219 (GHSA-58qw-9mgm-455v). pip 26.1+
          # contains the fix, so pip-audit --strict no longer flags it.
          python -m pip install --upgrade "pip>=26.1"
          pip install pip-audit

      - name: Install dependencies
        run: |
          # Install only dependencies, not the package itself (to avoid editable issue)
          pip install typer rich huggingface-hub fastapi uvicorn pydantic httpx sse-starlette pyyaml
          pip install pytest pytest-asyncio ruff pytest-cov mypy numpy

      - name: Run pip-audit
        run: pip-audit --strict

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for secret scanning

      # gitleaks/gitleaks-action@v2 still runs on Node.js 20 and the
      # upstream has not shipped a Node 24 release. Drive the official
      # Go binary directly — same scan, no Node runtime dependency.
      - name: Detect secrets with gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}" gitleaks
          "${RUNNER_TEMP}/gitleaks" detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --verbose

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
