# Build + sign the Windows MSI on v* release tags.
#
# Pipeline:
#   1. Build a one-file PyInstaller executable (``dist/hfl.exe``).
#   2. Render the WiX recipe with the release version.
#   3. Run ``candle`` + ``light`` to produce the MSI.
#   4. Sign with an Authenticode certificate stored in
#      ``WINDOWS_CODE_SIGN_CERT`` (pfx base64) + ``…_PASSWORD``.
#   5. Upload as a release asset + refresh the WinGet manifest.
#
# The signing step is gated on the cert secrets being present so the
# build can still validate structure on forks.

name: Windows MSI

on:
  # Tag trigger intentionally removed: no automatic MSI build/publish. Run
  # manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build pyinstaller
          choco install wixtoolset --no-progress -y

      - name: Build PyInstaller executable
        run: |
          pip install -e ".[llama]"
          pyinstaller --onefile --name hfl --icon packaging\windows\hfl.ico --collect-data hfl src\hfl\cli\main.py

      - name: Derive version
        id: ver
        run: |
          $ref = $env:GITHUB_REF_NAME
          if ($ref -match '^v\d') {
            $version = $ref.TrimStart('v')
          } else {
            # Manual/test dispatch on a branch (not a v* tag): take the
            # version from pyproject so the MSI is still named correctly.
            $m = Select-String -Path pyproject.toml -Pattern '^version = "(.+)"' |
                 Select-Object -First 1
            $version = $m.Matches[0].Groups[1].Value
          }
          echo "version=$version" >>"$env:GITHUB_OUTPUT"
          Write-Host "Resolved MSI version: $version (ref=$ref)"

      - name: Render wxs
        run: |
          (Get-Content packaging\windows\hfl.wxs -Raw) `
              -replace '@HFL_VERSION@', '${{ steps.ver.outputs.version }}' |
          Set-Content packaging\windows\hfl.rendered.wxs

      - name: Build MSI
        run: |
          # Locate the WiX v3 bin dir rather than hard-coding "v3.14": the
          # choco package version can move, and a wrong path is a silent
          # break. Fail loudly if candle.exe can't be found.
          $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
                    ForEach-Object { Join-Path $_.FullName "bin" } |
                    Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
                    Select-Object -First 1
          if (-not $wixBin) {
            throw "WiX candle.exe not found under 'C:\Program Files (x86)\WiX Toolset*'. Did choco install WiX v3?"
          }
          Write-Host "Using WiX bin: $wixBin"
          & "$wixBin\candle.exe" -out dist\hfl.wixobj packaging\windows\hfl.rendered.wxs
          & "$wixBin\light.exe" -ext WixUIExtension `
             -out dist\hfl-${{ steps.ver.outputs.version }}.msi dist\hfl.wixobj

      - name: Decode code-sign certificate
        if: ${{ env.WINDOWS_CODE_SIGN_CERT != '' }}
        env:
          WINDOWS_CODE_SIGN_CERT: ${{ secrets.WINDOWS_CODE_SIGN_CERT }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CODE_SIGN_CERT)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $bytes)

      - name: Sign MSI
        if: ${{ env.WINDOWS_CODE_SIGN_CERT != '' }}
        env:
          WINDOWS_CODE_SIGN_CERT: ${{ secrets.WINDOWS_CODE_SIGN_CERT }}
          WINDOWS_CODE_SIGN_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGN_PASSWORD }}
        run: |
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" `
             sign /fd sha256 /tr http://timestamp.sectigo.com /td sha256 `
             /f "$env:RUNNER_TEMP\codesign.pfx" /p $env:WINDOWS_CODE_SIGN_PASSWORD `
             dist\hfl-${{ steps.ver.outputs.version }}.msi

      - name: Upload artefact
        uses: actions/upload-artifact@v6
        with:
          name: hfl-msi
          path: dist/hfl-*.msi

      - name: Attach to release
        # Only attach on a real version tag. A manual/test dispatch on a
        # branch still builds + uploads the artefact above, but must not
        # create a junk "main" GitHub Release.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/hfl-*.msi
