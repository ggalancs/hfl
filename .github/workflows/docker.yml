# Build + push Docker images on release tags.
#
# Two independent jobs — one per architecture — running on the
# architecture-native runner. No QEMU, no emulated cross-builds.
#
# - ``build-amd64``: runs on the standard ``ubuntu-latest`` (x86_64).
# - ``build-arm64``: runs on ``ubuntu-24.04-arm`` (native ARM64 runner,
#   free for public repos since 2025).
#
# Each job builds + pushes its own per-architecture image tag, then a
# third ``manifest`` job stitches them into a single multi-arch
# image (``ghcr.io/…/hfl:<version>``) via ``docker buildx imagetools``.
# This avoids the two pathological failure modes the initial
# QEMU-driven layout hit:
#
#   1. ``llama-cpp-python`` has no ``manylinux_aarch64`` wheel, so pip
#      compiled it from source inside QEMU; RAM pressure + the 3-4 ×
#      emulation slowdown tripped the wheel build on the ARM64 leg
#      after ~11 min.
#   2. Any single Dockerfile step that crashed on one architecture
#      failed the whole multi-platform buildx invocation, even when
#      the other arch was green.
#
# Running on the native runner also cuts build times by ~5 × on ARM64
# (no QEMU) and keeps the signing / tagging story identical.
#
# Signing: cosign keyless. The OIDC identity is the workflow itself,
# so no private key lives in the repo.

name: Docker

on:
  # Tag trigger intentionally removed: no automatic image publish. Run
  # manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write  # required for cosign keyless signing

jobs:
  # ----------------------------------------------------------------
  # Per-architecture builds. Each pushes ``…:<tag>-<arch>`` plus the
  # per-extras flavour. The manifest step below aggregates them.
  # ----------------------------------------------------------------

  build-amd64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras: [llama, all]
    outputs:
      digest-llama: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive arch-scoped image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/hfl
          flavor: |
            suffix=${{ matrix.extras == 'all' && '-all-amd64' || '-amd64' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push (amd64 only)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HFL_EXTRAS=${{ matrix.extras }}
          cache-from: type=gha,scope=hfl-amd64-${{ matrix.extras }}
          cache-to: type=gha,scope=hfl-amd64-${{ matrix.extras }},mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: ${{ steps.build.outputs.digest != '' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  build-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        extras: [llama, all]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive arch-scoped image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/hfl
          flavor: |
            suffix=${{ matrix.extras == 'all' && '-all-arm64' || '-arm64' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push (arm64 only, native runner)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HFL_EXTRAS=${{ matrix.extras }}
          cache-from: type=gha,scope=hfl-arm64-${{ matrix.extras }}
          cache-to: type=gha,scope=hfl-arm64-${{ matrix.extras }},mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: ${{ steps.build.outputs.digest != '' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  # ----------------------------------------------------------------
  # Manifest aggregation — stitches the two per-arch images into a
  # single multi-arch tag so ``docker pull ghcr.io/…/hfl:<ver>``
  # (no suffix) transparently picks the right arch for the host.
  # ----------------------------------------------------------------

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras: [llama, all]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive multi-arch image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/hfl
          flavor: |
            suffix=${{ matrix.extras == 'all' && '-all' || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && matrix.extras == 'llama' }}

      - name: Create + push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # The build jobs only pushed per-arch images for the *versioned*
          # tags (``<version><suffix>-amd64`` / ``-arm64``). Tags like
          # ``latest`` have NO per-arch variant, so the old "append -amd64 to
          # every target tag" loop died on ``latest-arm64: not found``.
          #
          # Instead: stitch ONE multi-arch manifest from the first (version)
          # tag's per-arch images and apply EVERY target tag to that manifest.
          base="$(printf '%s\n' "${TAGS}" | head -n1)"   # e.g. ghcr.io/…/hfl:1.2.3-all
          [ -z "$base" ] && { echo "no tags to stitch"; exit 1; }
          src_amd64="${base}-amd64"
          src_arm64="${base}-arm64"
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(--tag "$tag")
          done <<< "${TAGS}"
          echo "Stitching ${src_amd64} + ${src_arm64} -> ${tag_args[*]}"
          docker buildx imagetools create "${tag_args[@]}" "${src_amd64}" "${src_arm64}"
